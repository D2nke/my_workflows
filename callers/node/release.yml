name: Release (Node)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  node-sandbox-build:
    name: "🚀 Node Build Sandbox"
    uses: D2nke/my_workflows/.github/workflows/node_build.yml@latest
    with:
      enable-test: true
      enable-sonar: true
      enable-snky: true
    secrets: inherit

  node-sandbox-deploy:
    name: "🚀 Node Deploy to Sandbox"
    uses: D2nke/my_workflows/.github/workflows/node_release_deploy.yml@latest
    secrets: inherit
