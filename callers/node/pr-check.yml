name: PR Check (Node)

on:
  push:
    branches-ignore:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  node-sandbox-build:
    name: "🚀 Node Build Sandbox"
    uses: D2nke/my_workflows/.github/workflows/node_build.yml@latest
    with:
      enable-test: true
      enable-sonar: ${{ vars.SONAR_OVERALL_STATUS || true }}
      enable-snky: ${{ vars.SNKY_OVERALL_STATUS || true}}
      pr-check: true
    secrets: inherit