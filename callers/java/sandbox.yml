name: Sandbox (Java)

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'

jobs:
  pre-build:
    name: Pre-Build Validation
    uses: D2nke/my_workflows/.github/workflows/pre-build.yml@latest

  security:
    name: Security Scan
    needs: pre-build
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@latest
    with:
      sonar_project_key: ${{ github.repository_owner }}-${{ github.event.repository.name }}-dev
      enable_mend: false
      java_version: '17'
    secrets: inherit
    continue-on-error: true

  tests:
    name: Unit Tests
    needs: security
    uses: D2nke/my_workflows/.github/workflows/test-java.yml@latest
    with:
      java_version: '17'
      build_tool: maven
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: tests
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@latest
    with:
      image_name: docker.io/${{ secrets.DOCKER_USERNAME }}/my-api
      dockerfile: ./Dockerfile
      context: .
      tag: ${{ github.sha }}-dev
    secrets: inherit
    continue-on-error: true
