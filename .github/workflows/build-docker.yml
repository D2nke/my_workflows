name: Build Docker

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name (e.g. ghcr.io/org/app)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      tag:
        description: "Image tag (defaults to github.sha)"
        required: false
        type: string
        default: ""
    secrets:
      GHCR_PASSWORD:
        required: true
    outputs:
      image-uri:
        description: "Full image URI with tag"
        value: ${{ jobs.build.outputs.image-uri }}

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "📝 Calculando tag da imagem"
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "→ Tag calculada: $TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: "🔧 Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔑 Login no container registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: "📝 Metadados da imagem"
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest

      - name: "🏗️ Build e Push imagem"
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          # Apenas tags para o ghcr.io
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ steps.meta.outputs.tags }}

      - name: "✓ Docker image built e pushed"
        run: |
          echo "✓ Image URI: ${{ steps.meta.outputs.tags }}"
          echo "→ Disponível para deploy"
