name: Files Update Interface

on:
  workflow_call:
    inputs:
      source-repo:
        type: string
        description: Repository with source files
        required: true
      source-dir:
        type: string
        description: Directory in source repo with files to copy
        required: true
      target-dir:
        type: string
        description: Target directory in caller repo
        required: true
        default: '.github/workflows'
      dry-run:
        type: boolean
        description: Do not make actual changes (dry-run mode)
        required: false
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: "📥 Checkout caller repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: my_project
          token: ${{ secrets.GH_PAT }}

      - name: "📥 Checkout source repo (temporário)"
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source-repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: my_workflows

      - name: "📁 Configurar git"
        run: |
          cd ./my_project
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: "📋 Copiar arquivos"
        run: |
          echo "→ Copiando de ${{ inputs.source-dir }}"
          echo "  para ${{ inputs.target-dir }}"
          mkdir -p ./my_project/"${{ inputs.target-dir }}"
          cp -v ./my_workflows/${{ inputs.source-dir }}/* ./my_project/"${{ inputs.target-dir }}/" 2>/dev/null || true
          echo "✓ Arquivos copiados"

      - name: "✅ Verificar mudanças"
        id: changes
        run: |
          cd ./my_project
          git add ${{ inputs.target-dir }}
          if git diff --cached --quiet; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "→ Nenhuma mudança detectada"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "→ Mudanças detectadas:"
            git diff --cached --name-only
          fi

      - name: "💾 Commit e Push (se houver mudanças)"
        if: steps.changes.outputs.has-changes == 'true' && inputs.dry-run == false
        run: |
          cd ./my_project
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git commit -m "ci: sync files from ${{ inputs.source-repo }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: "✓ Sync concluído"
        run: |
          if [[ "${{ steps.changes.outputs.has-changes }}" == "true" ]]; then
            echo "✓ Sincronização completada"
            echo "  Branch: ${{ github.ref_name }}"
            echo "  Source: ${{ inputs.source-repo }}/${{ inputs.source-dir }}"
            echo "  Target: ${{ inputs.target-dir }}"
          else
            echo "→ Nenhuma mudança necessária"
          fi
