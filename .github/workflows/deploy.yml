name: Deploy

on:
  workflow_call:
    inputs:
      target:
        description: "Deploy target: server | databricks | azure-app-service"
        required: true
        type: string
      environment:
        description: "Environment: dev | hom | prd"
        required: true
        type: string
      image_name:
        description: "Docker image to deploy (for server/azure targets)"
        required: false
        type: string
      databricks_job_id:
        description: "Databricks job ID (for databricks target)"
        required: false
        type: string
    secrets:
      ssh_private_key:
        required: false
      azure_credentials:
        required: false
      databricks_token:
        required: false

env:
  SERVER_ADDRESS: ${{ vars[format('{0}_SERVER', inputs.environment)] }}

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deploy em servidor Linux via SSH
      - name: "🚀 Deploy to Linux server"
        if: inputs.target == 'server'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
        run: |
          echo "→ Configurando SSH..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "→ Deployando em ${{ env.SERVER_ADDRESS }}..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ env.SERVER_ADDRESS }} \
            "docker pull ${{ inputs.image_name }}:latest && \
             docker stop app || true && \
             docker rm app || true && \
             docker run -d --name app --restart always ${{ inputs.image_name }}:latest"
          echo "✓ Deploy no servidor completado"

      # Deploy no Databricks
      - name: "🚀 Trigger Databricks job"
        if: inputs.target == 'databricks'
        run: |
          echo "→ Triggering Databricks job..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.databricks_token }}" \
            -H "Content-Type: application/json" \
            -d '{"job_id": ${{ inputs.databricks_job_id }}}' \
            https://${{ env.SERVER_ADDRESS }}/api/2.1/jobs/run-now
          echo "✓ Databricks job triggered"
        continue-on-error: true

      # Deploy no Azure App Service
      - name: "🚀 Deploy to Azure App Service"
        if: inputs.target == 'azure-app-service'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          images: ${{ inputs.image_name }}:latest
          credentials: ${{ secrets.azure_credentials }}

      - name: "✓ Deploy concluído"
        run: echo "✓ Deploy em ${{ inputs.environment }} finalizado"
