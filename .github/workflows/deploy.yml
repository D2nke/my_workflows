name: Deploy (Fly.io)

on:
  workflow_call:
    inputs:
      fly_app:
        description: "Nome do app no Fly.io"
        type: string
        default: ${{ github.event.repository.name }}
      environment:
        description: "Ambiente: dev | staging | prd"
        required: true
        type: string
      image_name:
        description: "Imagem Docker completa (ex: docker.io/user/app)"
        required: true
        type: string
      image_tag:
        description: "Tag da imagem Docker"
        required: false
        type: string
        default: "latest"
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    name: "Deploy ${{ inputs.fly_app }} → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: "🔧 Instalando Fly CLI..."
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: "🔍 Verificando conexão com o Fly.io..."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "→ Verificando conexão com o Fly.io..."
          flyctl auth whoami
          echo "✓ Conexão bem sucedida"

      - name: "📋 Criando app se não existir..."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          org_name"${{ vars.FLY_ORG }}"
          name_app="${{ inputs.fly_app }}"
          owner_app="${{ github.repository_owner }}"
          name_app="$org_name-${name_app//_/-}-$owner_app"

          flyctl status --app "$name_app" 2>/dev/null \
            || flyctl apps create --name "$name_app" --org "${{ vars.FLY_ORG }}"

      - name: "🚀 Deployando no Fly.io..."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "→ Iniciando deploy..."
          echo "  App:      ${{ inputs.fly_app }}"
          echo "  Imagem:   ${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "  Ambiente: ${{ inputs.environment }}"
          flyctl deploy \
            --app ${{ inputs.fly_app }} \
            --image ${{ inputs.image_name }}:${{ inputs.image_tag }} \
            --strategy rolling
          echo "✓ Deploy concluído com sucesso"

      - name: "✓ Deploy finalizado"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "✓ App '${{ inputs.fly_app }}' rodando em ${{ inputs.environment }}"
          flyctl status --app ${{ inputs.fly_app }}
