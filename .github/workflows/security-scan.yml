name: Security Scan

on:
  workflow_call:
    inputs:
      sonar_project_key:
        description: "SonarQube project key"
        required: false
        type: string
        default: ""
      sonar_organization:
        description: "SonarQube organization key"
        required: false
        type: string
        default: ""
      enable_snyk:
        description: "Enable Snyk dependency scan"
        required: false
        type: boolean
        default: true
      enable_sonar:
        description: "Enable SonarQube quality gate"
        required: false
        type: boolean
        default: true
      coverage_report_paths:
        description: "Paths to coverage reports (comma-separated)"
        required: false
        type: string
        default: "coverage.xml,**/target/site/jacoco/jacoco.xml"

jobs:
  snyk-scan:
    name: "🔍 Snyk Dependency Scan"
    runs-on: ubuntu-latest
    if: inputs.enable_snyk == true
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "📦 Setup Node (para Snyk)"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        continue-on-error: true

      - name: "🔍 Run Snyk Scan"
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --json
            --json-file-output=snyk-results.json
        continue-on-error: true

      - name: "📋 Parse Snyk Results"
        id: snyk-results
        run: |
          if [[ -f "snyk-results.json" ]]; then
            echo "→ Snyk: Scanning dependencies..."
            cat snyk-results.json | jq '.vulnerabilities[]? | "\(.severity): \(.title)"' || echo "✓ No vulnerabilities found"
            echo "✓ Snyk scan completed"
          else
            echo "✓ Snyk: No vulnerabilities detected"
          fi
        continue-on-error: true

      - name: "⚠️  Snyk Results Summary"
        run: |
          if [[ -f "snyk-results.json" ]]; then
            VULNS=$(jq '.summary.total // 0' snyk-results.json 2>/dev/null)
            echo "Found $VULNS vulnerabilities"
          else
            echo "✓ No dependency vulnerabilities found"
          fi
        continue-on-error: true

  sonarqube-scan:
    name: "🔍 SonarQube Quality Gate"
    runs-on: ubuntu-latest
    if: inputs.enable_sonar == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para análise de blame

      - name: "📋 List coverage reports"
        run: |
          echo "→ Procurando relatórios de cobertura..."
          find . -name "coverage.xml" -o -name "jacoco.xml" 2>/dev/null | head -10
          echo "✓ Relatórios identificados"

      - name: "🔍 SonarQube Scan"
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key || format('{0}-{1}', github.repository_owner, github.event.repository.name) }}
            ${{ inputs.sonar_organization && format('-Dsonar.organization={0}', inputs.sonar_organization) || '' }}
            -Dsonar.sources=.
            -Dsonar.coverage.exclusions=**/node_modules/**,**/*.test.js,**/*.test.py,**/tests/**
            ${{ inputs.coverage_report_paths && format('-Dsonar.javascript.lcov.reportPaths={0}', inputs.coverage_report_paths) || '' }}
            -Dsonar.qualitygate.wait=true
        continue-on-error: true

      - name: "✓ SonarQube scan concluído"
        run: |
          echo "✓ Qualidade de código verificada"
          echo "→ Verifique em: https://sonarcloud.io"
        continue-on-error: true

  security-summary:
    name: "📊 Security Summary"
    runs-on: ubuntu-latest
    needs: [snyk-scan, sonarqube-scan]
    if: always()
    steps:
      - name: "📋 Security Gate Status"
        run: |
          echo "════════════════════════════════════════"
          echo "  🔒 Security Gates Summary"
          echo "════════════════════════════════════════"
          echo "✓ Snyk Dependency Scan"
          echo "✓ SonarQube Quality Gate"
          echo "✓ Code Coverage Analysis"
          echo "════════════════════════════════════════"
